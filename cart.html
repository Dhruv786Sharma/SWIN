<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart</title>
   <style>
    /* --- Base Page Layout --- */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        background-color: #1a1a1a; /* Matching deep charcoal storefront theme */
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 40px 20px;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        gap: 30px; /* Even spacing between your image container and action button */
    }

    /* --- Cart Preview Asset Layout --- */
    img[alt="working"] {
        max-width: 100%;
        width: 450px; /* Restricts layout width so it stays crisp and elegant */
        height: auto;
        display: block;
        border-radius: 6px;
        background-color: #242424; /* Subtle backdrop panel contrast */
        padding: 24px;
        border: 1px solid #333;
        
        /* Premium shadow layers */
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.65), 
                    0 0 20px rgba(255, 102, 0, 0.03);
    }

    /* --- Interactive Navigation Button --- */
    button {
        background-color: transparent;
        color: #fff;
        border: 2px solid #ff6600; /* Swin's signature luxury orange accent */
        padding: 12px 36px;
        font-size: 0.95rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        cursor: pointer;
        width: 100%;
        max-width: 450px; /* Perfectly matches the width of your cart layout frame above */
        border-radius: 4px;
        transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
    }

    /* Smooth Micro-interactions on Hover */
    button:hover {
        background-color: #ff6600;
        color: #1a1a1a;
        transform: translateY(-2px);
        box-shadow: 0 6px 15px rgba(255, 102, 0, 0.25);
    }

    button:active {
        transform: translateY(0);
    }
</style>
</head>
<body>
    <img src="cart.png" alt="working">
    <button onclick="window.open('index.html')">Add Cart</button>

</body>
</html>
